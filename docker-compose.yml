version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: roc_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riversofchile_com}
      MYSQL_USER: ${MYSQL_USER:-riversofchilecom}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-"-9ZE3YDN"}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-33067}:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    image: wordpress:php8.4-apache
    container_name: roc_web
    restart: always
    ports:
      - "${WP_HTTP_PORT:-8086}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-riversofchilecom}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-"-9ZE3YDN"}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-riversofchile_com}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_roc_}
    volumes:
      - ./src:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db

volumes:
  db_data:
